name: Deploy to Aliyun FC

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-fc.yml'
  workflow_dispatch:   # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # 阿里云凭据
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIYUN_AK_ID }}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_AK_SECRET }}
      # 构建期注入（NEXT_PUBLIC_* 会烤进前端包）
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      # 运行期注入（写进 FC 函数环境变量）
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEOLYST_SUPABASE_URL: ${{ secrets.NEOLYST_SUPABASE_URL }}
      NEOLYST_SUPABASE_ANON_KEY: ${{ secrets.NEOLYST_SUPABASE_ANON_KEY }}
      NEOLYST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NEOLYST_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Package for FC
        run: bash scripts/build-fc-package.sh

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure Serverless Devs credentials
        run: |
          s config add --AccessKeyID "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --AccessKeySecret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            -a default -f

      - name: Deploy to FC
        run: s deploy -y
